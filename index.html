<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Marriage Invitation</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: 'Segoe UI', sans-serif;
  }

  /* GOLD TRADITIONAL BACKGROUND */
  body {
    background: linear-gradient(
      135deg,
      #f7e7b4 0%,
      #e6c76b 25%,
      #d4af37 50%,
      #c9a227 75%,
      #f7e7b4 100%
    );

    display: flex;
    justify-content: center;
    align-items: center;
  }

  .container {
    max-width: 420px;
    width: 90%;
    text-align: center;
    padding: 10px;
    filter: drop-shadow(0 20px 40px rgba(0,0,0,0.3));
  }

  .card-photo {
    width: 100%;
    border-radius: 15px;
    border: 5px solid white;
    margin-bottom: 20px;
  }

  .btn {
    background-color: #8b0000; /* deep maroon for traditional feel */
    color: white;
    padding: 16px 36px;
    font-size: 18px;
    font-weight: bold;
    border-radius: 50px;
    text-decoration: none;
    display: inline-block;
    transition: 0.3s;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
  }

  .btn:hover {
    background-color: #6d0000;
    transform: translateY(-3px);
  }

</style>
</head>

<body>

<div class="container">
  <!-- Invitation Card -->
  <img src="invite-photo.jpg" alt="Invitation Card" class="card-photo">

  <!-- Button -->
  <a href="rsvp.html" class="btn">Open Invitation 💌</a>
</div>

</body>
</html>
